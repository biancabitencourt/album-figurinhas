<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><title>Minha coleção</title>
    <link rel="stylesheet" th:href="@{/css/estilo.css}">
</head>
<body>
    <header>
        <a th:href="@{/figurinhas}">Catálogo</a>
        <a th:href="@{/minha-colecao}">Minha coleção</a>
		<a th:href="@{/adicionar-figurinha}">Adicionar figurinhas</a>
		<a th:href="@{/logout}">Sair</a>
    </header>
		<main>
        	<h1>Minha coleção</h1>
			<p th:if="${sucesso}" th:text="${sucesso}" style="color:green; font-weight:bold;"></p>
		
			<h2>Figurinhas possuídas</h2>
        	<p th:if="${colecao.isEmpty()}">Você ainda não tem figurinhas.
				<a th:href="@{/adicionar-figurinha}">Adicionar agora</a>.
			</p>
        
			<table th:unless="${colecao.isEmpty()}" class="tabela">
		            <thead>
		                <tr><th>Número</th><th>Quantidade</th><th>Ações</th></tr>
		            </thead>
		           	 <tbody>
		                <tr th:each="item : ${colecao}">
		                    <td th:text="${item.figurinha.numero}">1</td>
		                    <td th:text="${item.quantidade}">1</td>
		                    <td>
		                        <form th:action="@{/colecao/remover}" method="post">
		                            <input type="hidden" name="numero" th:value="${item.figurinha.numero}">
		                            <button class="btn" type="submit">Remover 1</button>
		                        </form>
		                    </td>
		                </tr>
		            </tbody>
			</table>
		</main>
</body>
</html>
