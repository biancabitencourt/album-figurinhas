<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Catálogo de figurinhas</title>
    <link rel="stylesheet" th:href="@{/css/estilo.css}">
</head>
<body>
    <header>
        <a th:href="@{/}">Início</a>
        <a th:href="@{/figurinhas}">Catálogo</a>
        <a th:href="@{/minha-colecao}">Minha coleção</a>
    </header>
    <main>
        <h1>Catálogo — 200 figurinhas</h1>
        <p>Estas são todas as figurinhas do álbum, numeradas de 1 a 200.</p>
        <div class="grid">
            <div class="figurinha" th:each="f : ${figurinhas}">
                <h3 th:text="${f.numero}">1</h3>
            </div>
        </div>
    </main>
</body>
</html>
