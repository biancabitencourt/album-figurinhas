<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8"><title>Cadastro</title>
	<link rel="stylesheet" th:href="@{/css/estilo.css}">
</head>

<body>
	<main>
		<div class="card">
			<h1> Criar conta</h1>
			<p th:if="${erro}" th:text="${erro}" style="color:red"></p>
			<form th:action="@{/cadastro}" method="post">
				<p><input type="text" name="login" placeholder="Login" required></p>
				<p><input type="password" name="senha" placeholder="Senha" required></p>
					<button class="btn" type="submit">Cadastrar</button>
			</form>
			<p>Já possui cadastro? <a th:href="@{/login}">Fazer login</a></p>
		</div>
	</main>
</body>
</html>
